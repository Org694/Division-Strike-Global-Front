<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVISION STRIKE: 3D FPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .overlay { pointer-events: auto; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10; }
        .hidden { display: none !important; }
        
        /* Shop & Story UI */
        #shop-menu { background: #111; padding: 30px; border: 2px solid #fbbf24; border-radius: 15px; text-align: center; }
        .weapon-card { display: inline-block; padding: 15px; margin: 10px; border: 1px solid #444; background: #222; width: 150px; }
        .btn { padding: 12px 25px; background: #fbbf24; color: black; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        /* Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 20px; font-size: 24px; text-shadow: 2px 2px #000; }
        #sound-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="hud" class="hidden">
            KILLS: <span id="kill-val">0</span> | WEAPON: <span id="weapon-val">AK47</span> | CASH: $<span id="cash-val">1000</span>
        </div>
        <div id="sound-toggle" onclick="toggleAudio()">🔊 Sound: ON</div>
    </div>

    <div id="story-screen" class="overlay">
        <h1 style="color: #fbbf24; letter-spacing: 5px;">DIVISION STRIKE</h1>
        <p id="story-text" style="max-width: 500px; text-align: center; font-size: 18px; min-height: 60px;"></p>
        <button class="btn" onclick="showShop()">ENTER ARMORY</button>
    </div>

    <div id="shop-screen" class="overlay hidden">
        <h1>SELECT LOADOUT</h1>
        <div id="shop-menu">
            <div class="weapon-card">
                <h3>AK-47</h3>
                <p>Standard Issue</p>
                <button class="btn" onclick="buyWeapon('AK47', 0)">EQUIP</button>
            </div>
            <div class="weapon-card">
                <h3>GOLD SNIPER</h3>
                <p>One-Tap Kill</p>
                <button class="btn" id="sniper-btn" onclick="buyWeapon('Sniper', 500)">$500</button>
            </div>
        </div>
    </div>

<script>
/** 3D CONFIG **/
let scene, camera, renderer, gun;
let gameState = 'STORY';
let kills = 0, coins = 1000, soundEnabled = true, currentWeapon = 'AK47';
let enemies = [];
const storyContent = "Invasion detected. The sector is compromised. Buy your weapons and hold the line. Do not let them reach the perimeter.";

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 10, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Ground
    const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
    scene.add(grid);

    // Create Gun Model (Simple blocks)
    gun = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.4, 0.2), new THREE.MeshStandardMaterial({color: 0x111111}));
    handle.position.y = -0.2;
    handle.position.z = 0.2;
    gun.add(body, handle);
    gun.position.set(0.5, -0.4, -0.8);
    camera.add(gun);
    scene.add(camera);

    window.addEventListener('resize', onWindowResize);
}

/** GAME LOGIC **/
function typeStory() {
    let i = 0;
    const target = document.getElementById('story-text');
    const timer = setInterval(() => {
        if (i < storyContent.length) {
            target.innerHTML += storyContent.charAt(i);
            i++;
        } else { clearInterval(timer); }
    }, 40);
}

function showShop() {
    document.getElementById('story-screen').classList.add('hidden');
    document.getElementById('shop-screen').classList.remove('hidden');
}

function buyWeapon(name, price) {
    if (coins >= price) {
        coins -= price;
        currentWeapon = name;
        document.getElementById('weapon-val').innerText = name;
        document.getElementById('cash-val').innerText = coins;
        startGame();
    }
}

function startGame() {
    document.getElementById('shop-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    gameState = 'PLAYING';
    spawnEnemy();
    animate();
}

function spawnEnemy() {
    if(gameState !== 'PLAYING') return;
    const geometry = new THREE.BoxGeometry(1, 2, 1);
    const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const enemy = new THREE.Mesh(geometry, material);
    
    // Position enemies far away in 3D space
    enemy.position.set((Math.random() - 0.5) * 20, 1, -40);
    scene.add(enemy);
    enemies.push({ mesh: enemy, health: currentWeapon === 'Sniper' ? 1 : 2 });
    
    setTimeout(spawnEnemy, 2000 - Math.min(kills * 50, 1500));
}

function playShootSound() {
    if(!soundEnabled) return;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function animate() {
    if(gameState !== 'PLAYING') return;
    requestAnimationFrame(animate);

    // Gun Sway Effect
    gun.position.x = 0.5 + Math.sin(Date.now() * 0.002) * 0.02;
    gun.position.y = -0.4 + Math.cos(Date.now() * 0.002) * 0.02;

    // Move Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].mesh.position.z += 0.1 + (kills * 0.005);
        
        // Game Over Condition
        if (enemies[i].mesh.position.z > 2) {
            gameState = 'OVER';
            alert("SECTOR BREACHED! Total Kills: " + kills);
            location.reload();
        }
    }
    renderer.render(scene, camera);
}

// Shooting Logic
window.addEventListener('mousedown', () => {
    if (gameState !== 'PLAYING') return;
    playShootSound();

    // Recoil animation
    gun.position.z += 0.2;
    setTimeout(() => gun.position.z = -0.8, 50);

    // Raycasting (Shoot middle of screen)
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));

    if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const enemyIdx = enemies.findIndex(e => e.mesh === hitMesh);
        
        enemies[enemyIdx].health--;
        if (enemies[enemyIdx].health <= 0) {
            scene.remove(hitMesh);
            enemies.splice(enemyIdx, 1);
            kills++;
            coins += 50;
            document.getElementById('kill-val').innerText = kills;
            document.getElementById('cash-val').innerText = coins;
        }
    }
});

function toggleAudio() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-toggle').innerText = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF";
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init3D();
typeStory();
</script>
</body>
    </html>
