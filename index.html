<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVISION STRIKE: PRO EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .overlay { pointer-events: auto; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10; }
        .hidden { display: none !important; }
        
        #shop-menu { background: #111; padding: 30px; border: 2px solid #fbbf24; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .weapon-card { display: inline-block; padding: 15px; margin: 10px; border: 1px solid #444; background: #222; width: 150px; transition: 0.3s; }
        .weapon-card:hover { border-color: #fbbf24; }
        .btn { padding: 12px 25px; background: #fbbf24; color: black; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; text-transform: uppercase; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #hud { position: absolute; bottom: 30px; left: 30px; font-size: 22px; text-shadow: 2px 2px #000; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; border-left: 5px solid #fbbf24; }
        #sound-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px; pointer-events: auto; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="hud" class="hidden">
            KILLS: <span id="kill-val">0</span> | WEAPON: <span id="weapon-val">AK47</span> | CASH: $<span id="cash-val">1000</span>
        </div>
        <div id="sound-toggle" onclick="toggleAudio()">🔊 Sound: ON</div>
    </div>

    <div id="story-screen" class="overlay">
        <h1 style="color: #fbbf24; letter-spacing: 8px; margin-bottom: 0;">DIVISION STRIKE</h1>
        <p style="color: #666; font-size: 12px; margin-top: 5px;">TACTICAL 3D SURVIVAL</p>
        <p id="story-text" style="max-width: 500px; text-align: center; font-size: 18px; min-height: 60px; color: #ddd;"></p>
        <button class="btn" onclick="showShop()">ENTER ARMORY</button>
    </div>

    <div id="shop-screen" class="overlay hidden">
        <h1>ARMORY ACCESS</h1>
        <div id="shop-menu">
            <div class="weapon-card">
                <h3>AK-47</h3>
                <button class="btn" onclick="buyWeapon('AK47', 0)">EQUIP</button>
            </div>
            <div class="weapon-card">
                <h3>GOLD SNIPER</h3>
                <button class="btn" id="sniper-btn" onclick="buyWeapon('Sniper', 500)">$500</button>
            </div>
        </div>
    </div>

<script>
/** ENGINE CORE **/
let scene, camera, renderer, gun, muzzleFlash;
let gameState = 'STORY';
let kills = 0, coins = 1000, soundEnabled = true, currentWeapon = 'AK47';
let enemies = [];
const storyContent = "The perimeter has been breached. Armed hostiles approaching from all sectors. Use WASD to move, Mouse to aim, and SPACE to jump. Good luck, soldier.";

// Movement & Camera
let pitch = 0, yaw = 0;
const sensitivity = 0.002;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let velocity = new THREE.Vector3();
let canJump = true;

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.Fog(0x0a0a0a, 10, 70);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Light
    scene.add(new THREE.AmbientLight(0x404040, 1.5));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dLight.position.set(10, 20, 10);
    scene.add(dLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(200, 50, 0x333333, 0x222222));

    // Gun + Muzzle Flash
    gun = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.7), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshStandardMaterial({color: 0x000000}));
    barrel.rotation.x = Math.PI / 2; barrel.position.z = -0.4;
    
    muzzleFlash = new THREE.PointLight(0xfbbf24, 0, 3);
    const flashMesh = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0xfbbf24}));
    muzzleFlash.add(flashMesh);
    muzzleFlash.position.z = -0.7;
    
    gun.add(body, barrel, muzzleFlash);
    gun.position.set(0.35, -0.3, -0.6);
    camera.add(gun);
    scene.add(camera);

    setupControls();
}

function setupControls() {
    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
        if(e.code === 'Space' && canJump) { velocity.y += 0.2; canJump = false; }
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
    });
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body && gameState === 'PLAYING') {
            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            camera.rotation.order = "YXZ"; 
            camera.rotation.set(pitch, yaw, 0);
        }
    });
    document.body.addEventListener('click', () => { if (gameState === 'PLAYING') document.body.requestPointerLock(); });
}

/** GAMEPLAY FUNCTIONS **/
function showShop() {
    document.getElementById('story-screen').classList.add('hidden');
    document.getElementById('shop-screen').classList.remove('hidden');
}

function buyWeapon(name, price) {
    if (coins >= price) {
        coins -= price;
        currentWeapon = name;
        document.getElementById('weapon-val').innerText = name;
        document.getElementById('cash-val').innerText = coins;
        startGame();
    }
}

function startGame() {
    document.getElementById('shop-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    gameState = 'PLAYING';
    spawnEnemy();
    animate();
}

function spawnEnemy() {
    if(gameState !== 'PLAYING') return;
    const enemy = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 1.2), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
    head.position.y = 1.7;
    enemy.add(body, head);
    
    const angle = Math.random() * Math.PI * 2;
    const dist = 50;
    enemy.position.set(camera.position.x + Math.cos(angle) * dist, 1.25, camera.position.z + Math.sin(angle) * dist);
    scene.add(enemy);
    enemies.push({ mesh: enemy, health: currentWeapon === 'Sniper' ? 1 : 2, bob: Math.random() * 5 });
    
    setTimeout(spawnEnemy, Math.max(2500 - (kills * 50), 1000));
}

function animate() {
    if(gameState !== 'PLAYING') return;
    requestAnimationFrame(animate);

    // Player Movement
    const speed = 0.12;
    if (moveForward) camera.translateZ(-speed);
    if (moveBackward) camera.translateZ(speed);
    if (moveLeft) camera.translateX(-speed);
    if (moveRight) camera.translateX(speed);

    // Gravity & Jump
    camera.position.y += velocity.y;
    if (camera.position.y > 1.6) { velocity.y -= 0.01; } 
    else { camera.position.y = 1.6; velocity.y = 0; canJump = true; }

    // Gun Bob
    gun.position.y = -0.3 + Math.sin(Date.now() * 0.005) * 0.01;

    // Enemy AI
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dir = new THREE.Vector3().copy(camera.position).sub(e.mesh.position);
        dir.y = 0; // Keep on ground
        e.mesh.lookAt(camera.position.x, 1.25, camera.position.z);
        e.mesh.position.add(dir.normalize().multiplyScalar(0.07 + (kills * 0.001)));
        
        // Bobbing animation
        e.mesh.position.y = 1.25 + Math.sin(Date.now() * 0.01 + e.bob) * 0.2;

        if (e.mesh.position.distanceTo(camera.position) < 2) {
            gameState = 'OVER';
            alert("SQUAD WIPED. Kills: " + kills);
            location.reload();
        }
    }
    renderer.render(scene, camera);
}

window.addEventListener('mousedown', () => {
    if (gameState !== 'PLAYING' || document.pointerLockElement !== document.body) return;
    
    // Muzzle Flash Effect
    muzzleFlash.intensity = 5;
    setTimeout(() => muzzleFlash.intensity = 0, 40);

    // Sound
    if(soundEnabled) {
        const audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // Raycast
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(enemies.map(e => e.mesh), true);

    if (hits.length > 0) {
        let hitObj = hits[0].object;
        while(hitObj.parent && !hitObj.parent.isScene) hitObj = hitObj.parent; // Find top parent
        
        const idx = enemies.findIndex(e => e.mesh === hitObj);
        if(idx !== -1) {
            enemies[idx].health--;
            if (enemies[idx].health <= 0) {
                scene.remove(hitObj);
                enemies.splice(idx, 1);
                kills++; coins += 50;
                document.getElementById('kill-val').innerText = kills;
                document.getElementById('cash-val').innerText = coins;
            }
        }
    }
});

function typeStory() {
    let i = 0; const target = document.getElementById('story-text');
    const t = setInterval(() => {
        if (i < storyContent.length) { target.innerHTML += storyContent.charAt(i++); } 
        else { clearInterval(t); }
    }, 30);
}

function toggleAudio() { 
    soundEnabled = !soundEnabled; 
    document.getElementById('sound-toggle').innerText = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF"; 
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init3D();
typeStory();
window.addEventListener('resize', onWindowResize);

</script>
</body>
                    </html>
